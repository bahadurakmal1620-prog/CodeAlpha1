<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PyBot — Python FAQ Chatbot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0d0f14;
      --surface:   #141720;
      --card:      #1c2030;
      --border:    #252a3a;
      --green:     #4ade80;
      --green-dim: #1a3a28;
      --blue:      #60a5fa;
      --yellow:    #fbbf24;
      --red:       #f87171;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --dim:       #334155;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0;
      overflow: hidden;
    }

    /* ── GRID BACKGROUND ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.25;
      pointer-events: none;
      z-index: 0;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 780px;
      padding: 24px 20px 0;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      width: 46px;
      height: 46px;
      background: linear-gradient(135deg, #1e3a24, #0d1f12);
      border: 1px solid var(--green);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      box-shadow: 0 0 16px rgba(74, 222, 128, 0.2);
      flex-shrink: 0;
    }

    .header-text h1 {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: var(--green);
      letter-spacing: -0.5px;
    }

    .header-text p {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .status-badge {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--green-dim);
      border: 1px solid #166534;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 10px;
      color: var(--green);
      font-weight: 500;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.8); }
    }

    /* ── TOPIC CHIPS ── */
    .chips-row {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 780px;
      padding: 14px 20px 0;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chip-label {
      font-size: 9px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      align-self: center;
      margin-right: 2px;
    }

    .chip {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 4px 11px;
      border-radius: 6px;
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }

    .chip:hover {
      border-color: var(--blue);
      color: var(--blue);
      background: rgba(96, 165, 250, 0.07);
    }

    /* ── CHAT WINDOW ── */
    .chat-shell {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 780px;
      height: calc(100vh - 210px);
      min-height: 360px;
      margin: 14px 20px 0;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }

    /* window chrome */
    .window-bar {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .dot { width: 11px; height: 11px; border-radius: 50%; }
    .dot-r { background: #ff5f57; }
    .dot-y { background: #febc2e; }
    .dot-g { background: #28c840; }

    .window-title {
      margin-left: 8px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    /* messages area */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 22px 22px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb {
      background: var(--dim);
      border-radius: 2px;
    }

    /* ── MESSAGES ── */
    .msg-row {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      animation: slideIn 0.25s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-row.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 700;
    }

    .bot-avatar {
      background: linear-gradient(135deg, #1e3a24, #0d1f12);
      border: 1px solid var(--green);
      color: var(--green);
      box-shadow: 0 0 8px rgba(74, 222, 128, 0.15);
    }

    .user-avatar {
      background: linear-gradient(135deg, #1e2a4a, #0d1525);
      border: 1px solid var(--blue);
      color: var(--blue);
    }

    .bubble {
      max-width: 76%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.65;
    }

    .bot-bubble {
      background: var(--card);
      border: 1px solid var(--border);
      border-top-left-radius: 2px;
      color: var(--text);
    }

    .user-bubble {
      background: linear-gradient(135deg, #1e2a4a, #162040);
      border: 1px solid rgba(96, 165, 250, 0.25);
      border-top-right-radius: 2px;
      color: var(--blue);
      text-align: right;
    }

    /* matched question tag */
    .match-tag {
      margin-top: 9px;
      padding-top: 9px;
      border-top: 1px solid var(--border);
      font-size: 10px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .match-tag span.label {
      color: var(--yellow);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .confidence-bar-wrap {
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .confidence-bar {
      flex: 1;
      height: 3px;
      background: var(--dim);
      border-radius: 2px;
      overflow: hidden;
    }

    .confidence-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--green), #86efac);
      border-radius: 2px;
      transition: width 0.6s ease;
    }

    .confidence-label {
      font-size: 10px;
      color: var(--green);
      font-weight: 500;
      white-space: nowrap;
    }

    /* typing indicator */
    .typing-bubble {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      border-top-left-radius: 2px;
      padding: 14px 18px;
      display: inline-flex;
      gap: 5px;
      align-items: center;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      background: var(--green);
      border-radius: 50%;
      animation: typingBounce 1.2s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30%            { transform: translateY(-5px); opacity: 1; }
    }

    /* ── INPUT BAR ── */
    .input-bar {
      border-top: 1px solid var(--border);
      padding: 14px 16px;
      background: var(--card);
      display: flex;
      gap: 10px;
      align-items: center;
      flex-shrink: 0;
    }

    .prompt-symbol {
      color: var(--green);
      font-size: 15px;
      font-weight: 700;
      flex-shrink: 0;
    }

    #userInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--text);
      caret-color: var(--green);
    }

    #userInput::placeholder { color: var(--dim); }

    #sendBtn {
      background: linear-gradient(135deg, #166534, #14532d);
      border: 1px solid var(--green);
      color: var(--green);
      width: 36px;
      height: 36px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    #sendBtn:hover {
      background: linear-gradient(135deg, #15803d, #166534);
      box-shadow: 0 0 12px rgba(74, 222, 128, 0.3);
    }

    #sendBtn:active { transform: scale(0.94); }
    #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── FOOTER LINE ── */
    footer {
      position: relative;
      z-index: 10;
      font-size: 10px;
      color: var(--dim);
      text-align: center;
      padding: 10px 0 14px;
      letter-spacing: 0.04em;
    }

    footer span { color: var(--muted); }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo">🐍</div>
    <div class="header-text">
      <h1>PyBot</h1>
      <p>Python FAQ Assistant · NLP Powered</p>
    </div>
    <div class="status-badge">
      <div class="status-dot"></div>
      Online · 20 FAQs
    </div>
  </header>

  <!-- QUICK CHIPS -->
  <div class="chips-row">
    <span class="chip-label">Try:</span>
    <button class="chip" onclick="sendChip(this)">What is Python?</button>
    <button class="chip" onclick="sendChip(this)">How do I install Python?</button>
    <button class="chip" onclick="sendChip(this)">What are loops?</button>
    <button class="chip" onclick="sendChip(this)">How do functions work?</button>
    <button class="chip" onclick="sendChip(this)">What is OOP?</button>
    <button class="chip" onclick="sendChip(this)">Explain pip</button>
  </div>

  <!-- CHAT SHELL -->
  <div class="chat-shell">
    <div class="window-bar">
      <div class="dot dot-r"></div>
      <div class="dot dot-y"></div>
      <div class="dot dot-g"></div>
      <span class="window-title">pybot — bash — 80×24</span>
    </div>

    <div id="messages">
      <!-- Welcome message injected by JS -->
    </div>

    <div class="input-bar">
      <span class="prompt-symbol">›</span>
      <input id="userInput" type="text" placeholder="Ask a Python question..." autocomplete="off" />
      <button id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
  </div>

  <footer>CodeAlpha Internship · Task 2 · FAQ Chatbot &nbsp;|&nbsp; <span>NLP: Tokenizer · Stopwords · Stemmer · Cosine Similarity</span></footer>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl    = document.getElementById('userInput');
    const sendBtn    = document.getElementById('sendBtn');

    // ── Inject welcome message on load ──
    window.addEventListener('load', () => {
      appendBotMessage(
        "Hello! 👋 I'm <strong>PyBot</strong>, your Python FAQ assistant. Ask me anything about Python — variables, loops, functions, OOP, pip, virtual environments, and more.\n\nOr click one of the chips above to get started!",
        null, null
      );
    });

    // ── Enter key support ──
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    function sendChip(btn) {
      inputEl.value = btn.textContent.trim();
      sendMessage();
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      appendUserMessage(text);
      inputEl.value = '';
      sendBtn.disabled = true;

      const typingId = showTyping();

      try {
        const res  = await fetch('/chat', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ message: text })
        });
        const data = await res.json();
        removeTyping(typingId);
        appendBotMessage(data.answer, data.matched, data.confidence);
      } catch (err) {
        removeTyping(typingId);
        appendBotMessage('⚠️ Could not reach the server. Make sure app.py is running!', null, null);
      }

      sendBtn.disabled = false;
      inputEl.focus();
    }

    function appendUserMessage(text) {
      const row = document.createElement('div');
      row.className = 'msg-row user';
      row.innerHTML = `
        <div class="avatar user-avatar">U</div>
        <div class="bubble user-bubble">${escapeHtml(text)}</div>
      `;
      messagesEl.appendChild(row);
      scrollBottom();
    }

    function appendBotMessage(text, matchedQ, confidence) {
      const row = document.createElement('div');
      row.className = 'msg-row bot';

      let extra = '';
      if (matchedQ && confidence > 0) {
        const pct = Math.min(confidence, 100);
        extra = `
          <div class="match-tag">
            <span class="label">Matched FAQ</span>
            ${escapeHtml(matchedQ)}
          </div>
          <div class="confidence-bar-wrap">
            <div class="confidence-bar">
              <div class="confidence-fill" style="width:${pct}%"></div>
            </div>
            <span class="confidence-label">${pct}% match</span>
          </div>
        `;
      }

      // Allow basic <strong> and <br> in welcome message
      const safeText = text.replace(/\n/g, '<br>');

      row.innerHTML = `
        <div class="avatar bot-avatar">🐍</div>
        <div class="bubble bot-bubble">
          ${safeText}
          ${extra}
        </div>
      `;
      messagesEl.appendChild(row);
      scrollBottom();
    }

    function showTyping() {
      const id  = 'typing-' + Date.now();
      const row = document.createElement('div');
      row.className = 'msg-row bot';
      row.id = id;
      row.innerHTML = `
        <div class="avatar bot-avatar">🐍</div>
        <div class="typing-bubble">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      `;
      messagesEl.appendChild(row);
      scrollBottom();
      return id;
    }

    function removeTyping(id) {
      const el = document.getElementById(id);
      if (el) el.remove();
    }

    function scrollBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
